services:
  eaglerproxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    depends_on:
      - viaproxy
    restart: unless-stopped

  viaproxy:
    image: ghcr.io/viaversion/viaproxy:latest
    ports:
      - "25565:25565"
    volumes:
      - ./viaproxy:/data
    restart: unless-stopped
